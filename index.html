<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reading Buddy — Level 1</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;700;800&display=swap");
*{box-sizing:border-box;margin:0;padding:0}
body{--ink:#3A2E4D;--coral:#FF7A59;--sun:#FFC34D;--leaf:#4FB477;--sky:#6FB3E0;--rose:#FFE3DA;font-family:Nunito,system-ui,sans-serif;color:var(--ink);min-height:100vh;padding:24px 16px 48px;background:radial-gradient(1200px 500px at 80% -10%,#FFE9C9 0%,transparent 60%),radial-gradient(900px 500px at -10% 110%,#FBD9E6 0%,transparent 55%),#FFF8EC}
.wrap{max-width:760px;margin:0 auto}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.logo{font-family:"Baloo 2",sans-serif;font-weight:800;font-size:26px}
.back{margin-left:auto;border:none;background:#fff;color:var(--ink);font-family:"Baloo 2",sans-serif;font-weight:700;font-size:15px;cursor:pointer;padding:9px 16px;border-radius:999px;box-shadow:0 3px 0 #E7D9C4}
.hello{font-family:"Baloo 2",sans-serif;font-weight:800;font-size:30px;line-height:1.15;margin-bottom:4px}
.sub{font-size:16px;opacity:.7;margin-bottom:22px;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border-radius:22px;padding:18px;cursor:pointer;box-shadow:0 8px 0 rgba(58,46,77,.07);border:3px solid #fff;transition:transform .12s,border-color .12s;text-align:left;width:100%;font-family:inherit}
.card:hover{transform:translateY(-3px);border-color:var(--sun)}
.cover{font-size:46px;line-height:1;margin-bottom:10px}
.card h3{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:20px}
.lvl{display:inline-block;margin-top:8px;font-size:12px;font-weight:800;background:var(--rose);color:var(--coral);padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
.page-card{background:#fff;border-radius:26px;padding:22px;box-shadow:0 10px 0 rgba(58,46,77,.07)}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.page-title{font-family:"Baloo 2",sans-serif;font-weight:800;font-size:20px}
.page-count{font-weight:800;font-size:14px;opacity:.55}
.illwrap{width:100%;height:200px;border-radius:16px;overflow:hidden;margin-bottom:14px}
.illwrap svg{width:100%;height:100%;display:block}
.reading{font-size:30px;line-height:1.65;font-weight:700;text-align:center;min-height:70px}
.word{padding:0 2px;border-radius:6px;transition:background .15s}
.word.on{background:var(--sun)}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.btn{border:none;cursor:pointer;font-family:"Baloo 2",sans-serif;font-weight:700;font-size:16px;padding:13px 18px;border-radius:16px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 0 rgba(0,0,0,.18);transition:transform .1s}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn.listen{background:var(--sky);color:#fff}
.btn.mine{background:var(--coral);color:#fff}
.btn.quiz{background:var(--leaf);color:#fff}
.btn.ghost{background:#fff;color:var(--ink);box-shadow:0 4px 0 #E7D9C4}
.pager{display:flex;gap:10px;margin-top:16px;justify-content:center}
.dot{width:11px;height:11px;border-radius:50%;background:#E7D9C4;border:none;cursor:pointer}
.dot.on{background:var(--coral);transform:scale(1.25)}
.banner{background:#fff;border-radius:14px;padding:11px 14px;font-weight:700;display:flex;align-items:center;gap:9px;margin-top:14px;color:#9C8A74;font-size:14px}
.q{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:22px;margin-bottom:16px;line-height:1.3}
.options{display:grid;gap:12px}
.option{text-align:left;background:#fff;border:3px solid #F0E5D2;border-radius:16px;padding:14px 17px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit}
.option:hover{border-color:var(--sky)}
.option.correct{border-color:var(--leaf);background:#E9F8EF}
.option.wrong{border-color:var(--coral);background:#FFEDE6}
.input{width:100%;border:3px solid #F0E5D2;border-radius:16px;padding:14px;font-size:17px;font-family:Nunito,sans-serif;font-weight:600;resize:none}
.input:focus{outline:none;border-color:var(--sky)}
.progress{height:10px;background:#F0E5D2;border-radius:999px;overflow:hidden;margin-bottom:18px}
.progress>div{height:100%;background:var(--leaf);transition:width .3s}
.finish{text-align:center;padding:28px 10px}
.finish .big{font-size:60px}
.finish h2{font-family:"Baloo 2",sans-serif;font-weight:800;font-size:28px;margin:10px 0}
</style>
</head>

var S={view:"library",story:null,page:0,stage:"read",myTurn:false,speaking:false,quiz:null};
var app=document.getElementById("app");

function stopSpeak(){try{window.speechSynthesis.cancel();}catch(e){}S.speaking=false;}

function esc(s){
  return String(s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];
  });
}

function illOf(id,p){return((ILL[id]||[])[p])||"";}

function hlWord(idx){
  document.querySelectorAll(".word.on").forEach(function(el){el.classList.remove("on");});
  var sp=document.querySelectorAll(".word");
  if(sp[idx])sp[idx].classList.add("on");
}

function speak(text){
  if(!("speechSynthesis" in window))return;
  stopSpeak();
  var words=text.split(/\s+/);
  var u=new SpeechSynthesisUtterance(text);
  u.rate=0.82;u.pitch=1.05;
  var vv=window.speechSynthesis.getVoices();
  var nv=vv.find(function(v){return/female|samantha|karen|moira|tessa/i.test(v.name);})||
         vv.find(function(v){return v.lang&&v.lang.startsWith("en");});
  if(nv)u.voice=nv;

  var boundaryWorking=false;
  var timer=null;

  function startFallbackTimer(){
    /* Estimate ~450ms per word at rate 0.82 — works on mobile where
       onboundary never fires (iOS Safari, many Android browsers) */
    var msPerWord=Math.round(450/u.rate);
    var wi=0;
    timer=setInterval(function(){
      if(!S.speaking||wi>=words.length){clearInterval(timer);return;}
      if(!boundaryWorking)hlWord(wi);
      wi++;
    },msPerWord);
  }

  u.onstart=function(){S.speaking=true;render();startFallbackTimer();};

  u.onboundary=function(e){
    if(e.charIndex==null)return;
    boundaryWorking=true;          /* desktop — cancel timer, use accurate events */
    clearInterval(timer);
    var idx=text.slice(0,e.charIndex).split(/\s+/).filter(Boolean).length;
    hlWord(idx);
  };

  u.onend=function(){
    clearInterval(timer);
    document.querySelectorAll(".word.on").forEach(function(el){el.classList.remove("on");});
    S.speaking=false;render();
  };

  u.onerror=function(){clearInterval(timer);S.speaking=false;render();};
  window.speechSynthesis.speak(u);
}

function openStory(story){stopSpeak();S.story=story;S.page=0;S.stage="read";S.myTurn=false;S.view="reader";render();}
function goLib(){stopSpeak();S.view="library";S.story=null;S.myTurn=false;render();}
function startQuiz(){stopSpeak();S.stage="quiz";S.quiz={qi:0,picked:null,feedback:null,correct:0,finished:false,openVal:""};render();}

function render(){
  if(S.view==="library")return renderLib();
  if(S.stage==="read")return renderRead();
  if(S.stage==="quiz")return renderQuiz();
}

function tb(back){
  return '<div class="topbar"><div class="logo">&#x1F989; Reading Buddy</div>'
    +(back?'<button class="back" data-act="library">\u2190 Library</button>':'')
    +'</div>';
}

function renderLib(){
  var cards=STORIES.map(function(s,i){
    return '<button class="card" data-open="'+i+'">'
      +'<div class="cover">'+s.cover+'</div>'
      +'<h3>'+esc(s.title)+'</h3>'
      +'<div class="lvl">Level 1</div>'
      +'</button>';
  }).join("");
  app.innerHTML=tb(false)
    +'<div class="hello">What shall we read today?</div>'
    +'<div class="sub">Pick a book \u2014 I\u2019ll read it to you, then it\u2019s your turn \ud83e\udd89</div>'
    +'<div class="grid">'+cards+'</div>';
}

function renderRead(){
  var s=S.story,p=S.page,ill=illOf(s.id,p);
  var words=s.pages[p].split(/\s+/).map(function(w,i){
    return '<span class="word" data-i="'+i+'">'+esc(w)+' </span>';
  }).join("");
  var ctrl="";
  if(!S.myTurn){
    ctrl='<div class="controls">'
      +'<button class="btn listen" data-act="speak">'+(S.speaking?"\u23F9 Stop":"\uD83D\uDD0A Read to me")+'</button>'
      +'<button class="btn mine" data-act="myturn">\uD83D\uDCD6 My turn</button>'
      +(p===s.pages.length-1?'<button class="btn quiz" data-act="quiz">\u2753 Quiz!</button>':"")
      +'</div>';
  } else {
    ctrl='<div class="banner" style="background:#FFF1E8;color:#C25A35">'
      +'\uD83D\uDCE3 Read this page out loud! Turn the page when you\u2019re ready.</div>'
      +'<div class="controls">'
      +'<button class="btn ghost" data-act="prev"'+(p===0?" disabled":"")+'>\u2190 Back</button>'
      +(p<s.pages.length-1
        ?'<button class="btn mine" data-act="next">Next \u2192</button>'
        :'<button class="btn quiz" data-act="quiz">\u2753 Quiz me!</button>')
      +'<button class="btn ghost" data-act="stopread">Stop</button>'
      +'</div>';
  }
  var dots=s.pages.map(function(_,i){
    return '<button class="dot'+(i===p?" on":"")+'" data-page="'+i+'"></button>';
  }).join("");
  app.innerHTML=tb(true)
    +'<div class="page-card">'
    +'<div class="page-head">'
    +'<div class="page-title">'+s.cover+" "+esc(s.title)+"</div>"
    +'<div class="page-count">Page '+(p+1)+" / "+s.pages.length+"</div>"
    +"</div>"
    +(ill?'<div class="illwrap">'+ill+"</div>":"")
    +'<div class="reading">'+words+"</div>"
    +ctrl
    +'<div class="pager">'+dots+"</div>"
    +"</div>";
}

function renderQuiz(){
  var s=S.story,Q=S.quiz,qs=s.quiz;
  if(Q.finished){
    var ic=Q.correct===qs.length?"\uD83C\uDFC6":(Q.correct>=qs.length/2?"\uD83C\uDF1F":"\uD83D\uDCDA");
    app.innerHTML=tb(true)+'<div class="page-card"><div class="finish">'
      +'<div class="big">'+ic+"</div>"
      +"<h2>You got "+Q.correct+" of "+qs.length+"!</h2>"
      +'<p style="font-weight:700;opacity:.7;margin-bottom:20px">'
      +(Q.correct===qs.length?"Perfect \u2014 you understood everything!":"Great work \u2014 keep reading!")
      +"</p>"
      +'<div class="controls" style="justify-content:center">'
      +'<button class="btn listen" data-act="readagain">\uD83D\uDCD6 Read again</button>'
      +'<button class="btn quiz" data-act="library">\uD83C\uDFE0 New book</button>'
      +"</div></div></div>";
    return;
  }
  var q=qs[Q.qi];
  var pct=Math.round(Q.qi/qs.length*100);
  var inner='<div class="progress"><div style="width:'+pct+'%"></div></div>'
    +'<div class="q">'+esc(q.question)+"</div>";
  if(q.type==="mc"){
    inner+='<div class="options">'+q.options.map(function(o){
      var c="option";
      if(Q.picked){if(o===q.answer)c+=" correct";else if(o===Q.picked)c+=" wrong";}
      return'<button class="'+c+'" data-mc="'+esc(o)+'"'+(Q.picked?" disabled":"")+">"+esc(o)+"</button>";
    }).join("")+"</div>";
  } else {
    inner+='<textarea id="oa" class="input" rows="3" placeholder="Type your answer\u2026"'
      +(Q.feedback?" disabled":"")+">"+(Q.openVal||"")+"</textarea>";
    if(!Q.feedback)inner+='<div class="controls"><button class="btn quiz" data-act="checkopen">Check \u2713</button></div>';
  }
  if(Q.feedback){
    inner+='<div class="feedback '+(Q.feedback.good?"good":"try")+'">'
      +(Q.feedback.good?"\uD83C\uDF89 ":"\uD83D\uDCA1 ")+esc(Q.feedback.msg)+"</div>"
      +'<div class="controls"><button class="btn quiz" data-act="nextq">'
      +(Q.qi+1>=qs.length?"See my score \u2192":"Next \u2192")
      +"</button></div>";
  }
  app.innerHTML=tb(true)+'<div class="page-card">'+inner+"</div>";
}

document.addEventListener("click",function(e){
  var el=e.target.closest("[data-open],[data-act],[data-page],[data-mc]");
  if(!el)return;
  if(el.dataset.open!=null){openStory(STORIES[+el.dataset.open]);return;}
  if(el.dataset.page!=null){stopSpeak();S.page=+el.dataset.page;render();return;}
  if(el.dataset.mc!=null){
    if(S.quiz.picked)return;
    var q=S.story.quiz[S.quiz.qi];
    var r=el.dataset.mc===q.answer;
    S.quiz.picked=el.dataset.mc;
    if(r)S.quiz.correct++;
    S.quiz.feedback={good:r,msg:r?"Yes! That\u2019s right!":"Not quite \u2014 the answer was \u201C"+q.answer+"\u201D."};
    render();return;
  }
  var a=el.dataset.act;
  if(a==="library")goLib();
  else if(a==="speak"){S.speaking?stopSpeak():speak(S.story.pages[S.page]);render();}
  else if(a==="myturn"){stopSpeak();S.myTurn=true;render();}
  else if(a==="stopread"){S.myTurn=false;render();}
  else if(a==="prev"){if(S.page>0){S.page--;render();}}
  else if(a==="next"){S.page++;render();}
  else if(a==="quiz")startQuiz();
  else if(a==="readagain"){S.stage="read";S.page=0;S.myTurn=false;render();}
  else if(a==="checkopen"){
    var v=(document.getElementById("oa").value||"").trim();
    if(!v)return;
    S.quiz.openVal=v;S.quiz.correct++;
    S.quiz.feedback={good:true,msg:"Great thinking! \uD83C\uDF1F"};
    render();
  }
  else if(a==="nextq"){
    var qs=S.story.quiz;
    if(S.quiz.qi+1>=qs.length)S.quiz.finished=true;
    else{S.quiz.qi++;S.quiz.picked=null;S.quiz.feedback=null;S.quiz.openVal="";}
    render();
  }
});

if("speechSynthesis" in window)window.speechSynthesis.onvoiceschanged=function(){};
render();
