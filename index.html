<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Buddy — Level 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');
* { box-sizing:border-box; margin:0; padding:0; }
body {
  --paper:#FFF8EC; --ink:#3A2E4D; --coral:#FF7A59; --sun:#FFC34D;
  --leaf:#4FB477; --sky:#6FB3E0; --rose:#FFE3DA;
  font-family:'Nunito','Segoe UI',system-ui,sans-serif; color:var(--ink); min-height:100vh; padding:24px 16px 48px;
  background:
    radial-gradient(1200px 500px at 80% -10%, #FFE9C9 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #FBD9E6 0%, transparent 55%), var(--paper);
}
.wrap { max-width:760px; margin:0 auto; }
.display { font-family:'Baloo 2',cursive; }
.topbar { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
.logo { font-family:'Baloo 2',sans-serif; font-weight:800; font-size:26px; }
.logo .owl { font-size:30px; }
.back { margin-left:auto; border:none; background:#fff; color:var(--ink); font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px; cursor:pointer; padding:9px 16px; border-radius:999px; box-shadow:0 3px 0 #E7D9C4; }
.back:active { transform:translateY(2px); box-shadow:0 1px 0 #E7D9C4; }
.hello { font-family:'Baloo 2',sans-serif; font-weight:800; font-size:30px; line-height:1.15; margin-bottom:4px; }
.sub { font-size:16px; opacity:.7; margin-bottom:22px; font-weight:600; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:560px){ .grid{ grid-template-columns:1fr; } }
.card { background:#fff; border-radius:22px; padding:18px; cursor:pointer; box-shadow:0 8px 0 rgba(58,46,77,.07); border:3px solid #fff; transition:transform .12s, border-color .12s; text-align:left; width:100%; font-family:inherit; }
.card:hover { transform:translateY(-3px); border-color:var(--sun); }
.cover { font-size:46px; line-height:1; margin-bottom:10px; }
.card h3 { font-family:'Baloo 2',sans-serif; font-weight:700; font-size:20px; }
.level { display:inline-block; margin-top:8px; font-size:12px; font-weight:800; background:var(--rose); color:var(--coral); padding:4px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:.5px; }
.page-card { background:#fff; border-radius:26px; padding:26px; box-shadow:0 10px 0 rgba(58,46,77,.07); }
.page-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.page-title { font-family:'Baloo 2',sans-serif; font-weight:800; font-size:22px; }
.page-count { font-weight:800; font-size:14px; opacity:.55; }
.reading { font-size:34px; line-height:1.7; font-weight:700; min-height:120px; text-align:center; }
.word { padding:0 2px; border-radius:6px; transition:background .15s; }
.word.on { background:var(--sun); }
.controls { display:flex; flex-wrap:wrap; gap:12px; margin-top:22px; }
.btn { border:none; cursor:pointer; font-family:'Baloo 2',sans-serif; font-weight:700; font-size:17px; padding:14px 20px; border-radius:16px; display:flex; align-items:center; gap:8px; box-shadow:0 4px 0 rgba(0,0,0,.18); transition:transform .1s; }
.btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.18); }
.btn[disabled]{ opacity:.45; cursor:not-allowed; }
.btn.listen { background:var(--sky); color:#fff; }
.btn.mine { background:var(--coral); color:#fff; }
.btn.quiz { background:var(--leaf); color:#fff; }
.btn.ghost { background:#fff; color:var(--ink); box-shadow:0 4px 0 #E7D9C4; }
.pager { display:flex; gap:10px; margin-top:18px; justify-content:center; }
.dot { width:11px; height:11px; border-radius:50%; background:#E7D9C4; border:none; cursor:pointer; }
.dot.on { background:var(--coral); transform:scale(1.25); }
.banner { background:#fff; border-radius:16px; padding:12px 16px; font-weight:700; display:flex; align-items:center; gap:10px; margin-top:16px; color:#9C8A74; font-size:14px; }
.feedback { margin-top:18px; border-radius:18px; padding:16px; font-weight:700; font-size:16px; display:flex; gap:10px; align-items:center; }
.feedback.good { background:#E5F6EC; color:#2E8B57; }
.feedback.try { background:#FFF1E8; color:#C25A35; }
.q { font-family:'Baloo 2',sans-serif; font-weight:700; font-size:24px; margin-bottom:18px; line-height:1.3; }
.options { display:grid; gap:12px; }
.option { text-align:left; background:#fff; border:3px solid #F0E5D2; border-radius:16px; padding:15px 18px; font-size:18px; font-weight:700; cursor:pointer; font-family:inherit; }
.option:hover { border-color:var(--sky); }
.option.correct { border-color:var(--leaf); background:#E9F8EF; }
.option.wrong { border-color:var(--coral); background:#FFEDE6; }
.input { width:100%; border:3px solid #F0E5D2; border-radius:16px; padding:15px; font-size:18px; font-family:'Nunito',sans-serif; font-weight:600; resize:none; }
.input:focus { outline:none; border-color:var(--sky); }
.progress { height:10px; background:#F0E5D2; border-radius:999px; overflow:hidden; margin-bottom:20px; }
.progress > div { height:100%; background:var(--leaf); transition:width .3s; }
.finish { text-align:center; padding:30px 10px; }
.finish .big { font-size:60px; }
.finish h2 { font-family:'Baloo 2',sans-serif; font-weight:800; font-size:30px; margin:10px 0; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const STORIES = [
  { id:"dog", cover:"🐕", title:"The Big Red Dog",
    pages:["I see a dog.","The dog is big.","The dog is red.","The dog can run.","I love my dog!"],
    quiz:[
      {type:"mc",question:"What is big?",options:["A dog","A cat","A bus"],answer:"A dog"},
      {type:"mc",question:"What colour is the dog?",options:["Red","Blue","Green"],answer:"Red"},
      {type:"mc",question:"What can the dog do?",options:["Run","Fly","Swim"],answer:"Run"},
      {type:"open",question:"What would you name this dog?"}
    ]},
  { id:"hop", cover:"🐰", title:"I Can Hop",
    pages:["I am a rabbit.","I can hop.","I hop up.","I hop down.","Hop, hop, hop!"],
    quiz:[
      {type:"mc",question:"What animal is in the story?",options:["A rabbit","A fish","A bird"],answer:"A rabbit"},
      {type:"mc",question:"What can the rabbit do?",options:["Hop","Swim","Read"],answer:"Hop"},
      {type:"open",question:"Can you hop like the rabbit? Give it a try!"}
    ]},
  { id:"cat", cover:"🐈", title:"My Cat Naps",
    pages:["This is my cat.","My cat is little.","My cat likes milk.","My cat naps all day.","Shh! Do not wake the cat."],
    quiz:[
      {type:"mc",question:"What does the cat like?",options:["Milk","Bread","Soup"],answer:"Milk"},
      {type:"mc",question:"Is the cat big or little?",options:["Little","Big"],answer:"Little"},
      {type:"mc",question:"What does the cat do all day?",options:["Naps","Runs","Sings"],answer:"Naps"},
      {type:"open",question:"Do you have a pet? What does it like to do?"}
    ]},
  { id:"sun", cover:"☀️", title:"Sun and Rain",
    pages:["Look at the sun.","The sun is hot.","Here comes the rain.","I see a rainbow.","I like the sun and rain."],
    quiz:[
      {type:"mc",question:"What is hot?",options:["The sun","The snow","The rain"],answer:"The sun"},
      {type:"mc",question:"What comes after the rain?",options:["A rainbow","A car","A dog"],answer:"A rainbow"},
      {type:"open",question:"What do you like to do on a rainy day?"}
    ]},
  { id:"yum", cover:"🍎", title:"Yum, Yum!",
    pages:["I am hungry.","I see a red apple.","I see a yellow banana.","I eat and eat.","Yum, yum! All gone."],
    quiz:[
      {type:"mc",question:"What colour is the apple?",options:["Red","Green","Blue"],answer:"Red"},
      {type:"mc",question:"What colour is the banana?",options:["Yellow","Purple","Pink"],answer:"Yellow"},
      {type:"open",question:"What is your favourite food?"}
    ]},
  { id:"park", cover:"🛝", title:"We Go to the Park",
    pages:["We go to the park.","I go on the swing.","I go down the slide.","We run and play.","I had so much fun!"],
    quiz:[
      {type:"mc",question:"Where do they go?",options:["The park","School","The shop"],answer:"The park"},
      {type:"mc",question:"What does the child go down?",options:["The slide","A hill","The stairs"],answer:"The slide"},
      {type:"open",question:"What do you like to do at the park?"}
    ]},
  { id:"bed", cover:"🌙", title:"Time for Bed",
    pages:["The sun goes down.","I put on my pyjamas.","I brush my teeth.","I hug my bear.","Good night! I love you."],
    quiz:[
      {type:"mc",question:"What goes down?",options:["The sun","The rain","A ball"],answer:"The sun"},
      {type:"mc",question:"What does the child hug?",options:["A bear","A dog","A pillow"],answer:"A bear"},
      {type:"open",question:"What do you do before bed?"}
    ]},
  { id:"duck", cover:"🦆", title:"The Little Duck",
    pages:["Here is a little duck.","The duck is yellow.","The duck can swim.","The duck says quack.","The little duck swims away."],
    quiz:[
      {type:"mc",question:"What colour is the duck?",options:["Yellow","Green","Brown"],answer:"Yellow"},
      {type:"mc",question:"What can the duck do?",options:["Swim","Hop","Climb"],answer:"Swim"},
      {type:"mc",question:"What does the duck say?",options:["Quack","Moo","Woof"],answer:"Quack"},
      {type:"open",question:"Can you say quack like a duck?"}
    ]},
  { id:"bigsmall", cover:"🐘", title:"Big and Small",
    pages:["The elephant is big.","The mouse is small.","The tree is tall.","The flower is short.","Big or small, I like them all!"],
    quiz:[
      {type:"mc",question:"What is big?",options:["The elephant","The mouse","The flower"],answer:"The elephant"},
      {type:"mc",question:"What is small?",options:["The mouse","The tree","The elephant"],answer:"The mouse"},
      {type:"open",question:"Can you name something big and something small near you?"}
    ]},
  { id:"colours", cover:"🌈", title:"I Like Colours",
    pages:["I like red.","I like blue.","I like green.","I like all the colours.","The rainbow has them all!"],
    quiz:[
      {type:"mc",question:"How many colours does the child like?",options:["All of them","Just one","Two"],answer:"All of them"},
      {type:"mc",question:"What has all the colours?",options:["The rainbow","The cat","The car"],answer:"The rainbow"},
      {type:"open",question:"What is your favourite colour?"}
    ]}
];

let S = { view:"library", story:null, page:0, stage:"read", myTurn:false, speaking:false, quiz:null };
const app = document.getElementById("app");

function stopSpeak(){ try{ window.speechSynthesis.cancel(); }catch(e){} S.speaking=false; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function speak(text){
  if(!("speechSynthesis" in window)) return;
  stopSpeak();
  const u = new SpeechSynthesisUtterance(text);
  u.rate=0.8; u.pitch=1.05;
  const voices = window.speechSynthesis.getVoices();
  const nice = voices.find(v=>/female|samantha|karen|moira|tessa/i.test(v.name)) || voices.find(v=>v.lang && v.lang.startsWith("en"));
  if(nice) u.voice=nice;
  u.onstart=()=>{ S.speaking=true; render(); };
  u.onboundary=(e)=>{
    if(e.charIndex==null) return;
    const idx = text.slice(0,e.charIndex).split(/\s+/).filter(Boolean).length;
    document.querySelectorAll(".word.on").forEach(el=>el.classList.remove("on"));
    const span = document.querySelector('.word[data-i="'+idx+'"]'); if(span) span.classList.add("on");
  };
  u.onend=()=>{ S.speaking=false; render(); };
  window.speechSynthesis.speak(u);
}

function open(story){ stopSpeak(); S.story=story; S.page=0; S.stage="read"; S.myTurn=false; S.view="reader"; render(); }
function goLibrary(){ stopSpeak(); S.view="library"; S.story=null; S.myTurn=false; render(); }
function startQuiz(){ stopSpeak(); S.stage="quiz"; S.quiz={qi:0,picked:null,feedback:null,correct:0,finished:false,openVal:""}; render(); }

function render(){
  if(S.view==="library") return renderLibrary();
  if(S.stage==="read") return renderRead();
  if(S.stage==="quiz") return renderQuiz();
}
function topbar(showBack){
  return '<div class="topbar"><div class="logo"><span class="owl">🦉</span> Reading Buddy</div>'+
    (showBack?'<button class="back" data-act="library">← Library</button>':'')+'</div>';
}
function renderLibrary(){
  const cards = STORIES.map((s,i)=>(
    '<button class="card" data-open="'+i+'"><div class="cover">'+s.cover+'</div><h3>'+esc(s.title)+'</h3><div class="level">Level 1</div></button>'
  )).join("");
  app.innerHTML = topbar(false)+
    '<div class="hello">What shall we read today?</div>'+
    '<div class="sub">First books for new readers. I\u2019ll read to you, then it\u2019s your turn 🦉</div>'+
    '<div class="grid">'+cards+'</div>';
}
function renderRead(){
  const s=S.story, p=S.page;
  const words = s.pages[p].split(/\s+/).map((w,i)=>'<span class="word" data-i="'+i+'">'+esc(w)+' </span>').join("");
  let controls;
  if(!S.myTurn){
    controls = '<div class="controls">'+
      '<button class="btn listen" data-act="speak">'+(S.speaking?"⏹ Stop":"🔊 Read to me")+'</button>'+
      '<button class="btn mine" data-act="myturn">📖 My turn to read</button>'+
      (p===s.pages.length-1?'<button class="btn quiz" data-act="quiz">❓ Quiz time</button>':'')+'</div>';
  } else {
    controls = '<div class="banner" style="background:#FFF1E8;color:#C25A35">📣 Read this page out loud to a grown-up. Turn the page when you\u2019re ready!</div>'+
      '<div class="controls">'+
      '<button class="btn ghost" data-act="prev"'+(p===0?" disabled":"")+'>← Back</button>'+
      (p<s.pages.length-1?'<button class="btn mine" data-act="next">Next page →</button>':'<button class="btn quiz" data-act="quiz">❓ I\u2019m done — quiz me!</button>')+
      '<button class="btn ghost" data-act="stopread">Stop reading</button></div>';
  }
  const dots = s.pages.map((_,i)=>'<button class="dot'+(i===p?" on":"")+'" data-page="'+i+'"></button>').join("");
  app.innerHTML = topbar(true)+
    '<div class="page-card"><div class="page-head"><div class="page-title">'+s.cover+' '+esc(s.title)+'</div>'+
    '<div class="page-count">Page '+(p+1)+' / '+s.pages.length+'</div></div>'+
    '<div class="reading display">'+words+'</div>'+controls+
    '<div class="pager">'+dots+'</div></div>';
}
function renderQuiz(){
  const s=S.story, Q=S.quiz, qs=s.quiz;
  if(Q.finished){
    const icon = Q.correct===qs.length?"🏆":(Q.correct>=qs.length/2?"🌟":"📚");
    app.innerHTML = topbar(true)+'<div class="page-card"><div class="finish"><div class="big">'+icon+'</div>'+
      '<h2>You got '+Q.correct+' of '+qs.length+'!</h2>'+
      '<p style="font-weight:700;opacity:.7;margin-bottom:20px">'+(Q.correct===qs.length?"Perfect! You really understood the story.":"Great work — keep reading!")+'</p>'+
      '<div class="controls" style="justify-content:center">'+
      '<button class="btn listen" data-act="readagain">📖 Read again</button>'+
      '<button class="btn quiz" data-act="library">🏠 New book</button></div></div></div>';
    return;
  }
  const q = qs[Q.qi];
  let inner = '<div class="progress"><div style="width:'+(Q.qi/qs.length*100)+'%"></div></div><div class="q">'+esc(q.question)+'</div>';
  if(q.type==="mc"){
    inner += '<div class="options">'+q.options.map(o=>{
      let cls="option"; if(Q.picked){ if(o===q.answer) cls+=" correct"; else if(o===Q.picked) cls+=" wrong"; }
      return '<button class="'+cls+'" data-mc="'+esc(o)+'"'+(Q.picked?" disabled":"")+'>'+esc(o)+'</button>';
    }).join("")+'</div>';
  } else {
    inner += '<textarea id="openans" class="input" rows="3" placeholder="Type your answer…"'+(Q.feedback?" disabled":"")+'>'+esc(Q.openVal||"")+'</textarea>';
    if(!Q.feedback) inner += '<div class="controls"><button class="btn quiz" data-act="checkopen">Check my answer</button></div>';
  }
  if(Q.feedback){
    inner += '<div class="feedback '+(Q.feedback.good?"good":"try")+'">'+(Q.feedback.good?"🎉 ":"💡 ")+esc(Q.feedback.msg)+'</div>'+
      '<div class="controls"><button class="btn quiz" data-act="nextq">'+(Q.qi+1>=qs.length?"See my score →":"Next question →")+'</button></div>';
  }
  app.innerHTML = topbar(true)+'<div class="page-card">'+inner+'</div>';
}

document.addEventListener("click", e=>{
  const el = e.target.closest("[data-open],[data-act],[data-page],[data-mc]"); if(!el) return;
  if(el.dataset.open!=null){ open(STORIES[+el.dataset.open]); return; }
  if(el.dataset.page!=null){ stopSpeak(); S.page=+el.dataset.page; render(); return; }
  if(el.dataset.mc!=null){
    if(S.quiz.picked) return;
    const q=S.story.quiz[S.quiz.qi]; const right=el.dataset.mc===q.answer;
    S.quiz.picked=el.dataset.mc; if(right) S.quiz.correct++;
    S.quiz.feedback={good:right,msg:right?"Yes! That\u2019s right!":"Not quite — the answer was \u201C"+q.answer+"\u201D."};
    render(); return;
  }
  const a=el.dataset.act;
  if(a==="library") goLibrary();
  else if(a==="speak"){ S.speaking?stopSpeak():speak(S.story.pages[S.page]); render(); }
  else if(a==="myturn"){ stopSpeak(); S.myTurn=true; render(); }
  else if(a==="stopread"){ S.myTurn=false; render(); }
  else if(a==="prev"){ if(S.page>0){S.page--; render();} }
  else if(a==="next"){ S.page++; render(); }
  else if(a==="quiz") startQuiz();
  else if(a==="readagain"){ S.stage="read"; S.page=0; S.myTurn=false; render(); }
  else if(a==="checkopen"){
    const v=(document.getElementById("openans").value||"").trim(); if(!v) return;
    S.quiz.openVal=v; S.quiz.correct++; S.quiz.feedback={good:true,msg:"Thanks for sharing your thinking! 🌟"}; render();
  }
  else if(a==="nextq"){
    const qs=S.story.quiz;
    if(S.quiz.qi+1>=qs.length) S.quiz.finished=true;
    else { S.quiz.qi++; S.quiz.picked=null; S.quiz.feedback=null; S.quiz.openVal=""; }
    render();
  }
});

if("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged=()=>{};
render();
</script>
</body>
</html>
